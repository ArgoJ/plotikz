name: Run Gemini Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Aufgabe für den Agenten'
        required: true
        default: 'Erstelle die Grundstruktur für plotikz'

# Rechte für Git-Push (contents) UND OIDC-Token (id-token) aktivieren
permissions:
  contents: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }} 
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Neues Google GenAI SDK installieren
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Agent ausführen
        env:
          GCP_PROJECT_ID: 'lcil-501610'
          GCP_LOCATION: 'europe-west3'
          AGENT_PROMPT: ${{ inputs.prompt }}
        run: |
          python agent.py

      - name: Code-Änderungen in GitHub speichern (Git Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "feat: Code vom Gemini Agenten generiert" && git push)
