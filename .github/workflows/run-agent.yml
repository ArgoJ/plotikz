name: Run Gemini Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Aufgabe für den Agenten'
        required: true
        default: 'Überprüfe das Projekt und erstelle die grundlegende Struktur.'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Agenten ausführen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python agent.py "${{ github.event.inputs.prompt }}"

      - name: Änderungen zurück in Git pushen
        run: |
          git config user.name "Gemini Agent Bot"
          git config user.email "agent@bot.local"
          git add .
          git diff --staged --quiet || (git commit -m "auto: Agent updates" && git push)
